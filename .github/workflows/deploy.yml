name: Deploy to Railway

on:
  push:
    branches:
      - main

jobs:
  deploy-backend:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway backend deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://backboard.railway.app/graphql/v2" \
            -d '{"query": "mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_BACKEND_ID }}\") }"}'

  deploy-frontend:
    name: Deploy frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Trigger Railway frontend deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            "https://backboard.railway.app/graphql/v2" \
            -d '{"query": "mutation { serviceInstanceRedeploy(serviceId: \"${{ secrets.RAILWAY_FRONTEND_ID }}\") }"}'